<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Central Guaviare - Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* MODO CLARO (Blanco Real) */
            --bg: #ffffff;
            --panel: #f8fafc;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --success: #16a34a;
            --card-head: #f1f5f9;
        }

        [data-theme="dark"] {
            /* MODO OSCURO (Azul Profundo) */
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --success: #10b981;
            --card-head: rgba(255,255,255,0.03);
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 90px; transition: all 0.2s; }

        /* HEADER */
        .app-header {
            padding: 15px 20px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
        }
        .app-header h1 { font-size: 1.1rem; margin: 0; font-weight: 700; }
        .header-actions { display: flex; gap: 8px; }

        /* BOTONES */
        .btn-icon { 
            background: var(--panel); border: 1px solid var(--border); 
            padding: 8px 12px; border-radius: 10px; cursor: pointer; font-size: 1.1rem;
            color: var(--text);
        }
        .sync-mini { 
            background: var(--primary); border: none; color: white; 
            padding: 8px 15px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
        }

        /* FILTROS */
        .filter-container {
            padding: 12px 15px; overflow-x: auto; display: flex; gap: 10px;
            background: var(--bg); -webkit-overflow-scrolling: touch;
        }
        .filter-btn {
            background: var(--panel); color: var(--text-dim); border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 20px; white-space: nowrap; font-size: 0.85rem; font-weight: 600;
        }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* CARDS */
        .product-card {
            background: var(--panel); margin: 15px; border-radius: 16px;
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .card-title {
            padding: 12px 15px; background: var(--card-head); border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 0.85rem; text-transform: uppercase;
            display: flex; justify-content: space-between;
        }
        .item-row { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .item-row.best { background: rgba(16, 185, 129, 0.05); }
        .local-info b { display: block; font-size: 0.95rem; }
        .local-info span { font-size: 0.75rem; color: var(--text-dim); }
        .price-tag { text-align: right; }
        .price-tag .amt { font-weight: 700; font-size: 1.1rem; display: block; }
        .win-label { color: var(--success); font-size: 0.65rem; font-weight: 800; border: 1px solid var(--success); padding: 2px 5px; border-radius: 4px; }

        /* BOTTOM BAR */
        .bottom-stats {
            position: fixed; bottom: 0; width: 100%;
            background: var(--bg); border-top: 1px solid var(--border); 
            display: grid; grid-template-columns: 1fr 1fr; 
            padding: 15px 10px 35px 10px; z-index: 1000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
        }
        .stat-box { text-align: center; border-right: 1px solid var(--border); }
        .stat-box:last-child { border-right: none; }
        .stat-box small { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; display: block; }
        .stat-box b { font-size: 1.2rem; }
    </style>
</head>
<body data-theme="light">

    <div class="app-header">
        <h1>Análisis Maestro</h1>
        <div class="header-actions">
            <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">🌙</button>
            <button class="sync-mini" onclick="cargarDatos()">Sincronizar</button>
        </div>
    </div>

    <div class="filter-container" id="barraFiltros"></div>

    <div id="contenedorProductos">
        <p style="text-align:center; padding:50px; color:var(--text-dim);">Actualizando datos...</p>
    </div>

    <div class="bottom-stats">
        <div class="stat-box"><small>Items</small><b id="total-prods">0</b></div>
        <div class="stat-box"><small>Ahorro</small><b id="total-savings" style="color:var(--success)">$0</b></div>
    </div>

<script>
    let datosOriginales = [];
    let comiteActual = 'TODOS';

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        const isDark = body.getAttribute('data-theme') === 'dark';
        
        if (isDark) {
            body.setAttribute('data-theme', 'light');
            btn.innerText = '🌙';
            localStorage.setItem('tema', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
            localStorage.setItem('tema', 'dark');
        }
    }

    // Cargar preferencia al inicio
    const temaGuardado = localStorage.getItem('tema') || 'light';
    document.body.setAttribute('data-theme', temaGuardado);
    document.getElementById('themeBtn').innerText = temaGuardado === 'dark' ? '☀️' : '🌙';

    async function cargarDatos() {
        const url = "https://script.google.com/macros/s/AKfycbwlHN-Q1vNSFdeIEJs4aooJR70Vr9LVkCKfuQvuxQX9KF8e6TefaB_2m2jyeSxFktdolA/exec";
        try {
            const r = await fetch(url + "?t=" + new Date().getTime());
            datosOriginales = await r.json();
            renderFiltros();
            renderPanel();
        } catch (e) {
            document.getElementById('contenedorProductos').innerHTML = "<p style='text-align:center;'>Error de conexión</p>";
        }
    }

    function renderFiltros() {
        const barra = document.getElementById('barraFiltros');
        const comites = [...new Set(datosOriginales.map(d => d.comite.trim()))];
        let html = `<div class="filter-btn ${comiteActual === 'TODOS' ? 'active' : ''}" onclick="setFiltro('TODOS')">Todo</div>`;
        comites.forEach(c => {
            if(!c) return;
            html += `<div class="filter-btn ${comiteActual === c ? 'active' : ''}" onclick="setFiltro('${c}')">${c}</div>`;
        });
        barra.innerHTML = html;
    }

    function setFiltro(n) { comiteActual = n; renderFiltros(); renderPanel(); }

    function renderPanel() {
        const contenedor = document.getElementById('contenedorProductos');
        let filtrados = comiteActual === 'TODOS' ? datosOriginales : datosOriginales.filter(d => d.comite.trim() === comiteActual);

        const productos = {};
        filtrados.forEach(item => {
            const p = item.producto.toUpperCase().trim();
            if(!productos[p]) productos[p] = { ofertas: [] };
            productos[p].ofertas.push({
                local: item.local,
                precio: parseFloat(item.precio) || 0,
                cant: item.cantidad
            });
        });

        contenedor.innerHTML = "";
        let ahorroGlobal = 0;
        let count = 0;

        for (let nombre in productos) {
            count++;
            const p = productos[nombre];
            p.ofertas.sort((a,b) => a.precio - b.precio);
            const mejor = p.ofertas[0];
            const peor = p.ofertas[p.ofertas.length - 1];
            ahorroGlobal += (peor.precio - mejor.precio) * mejor.cant;

            let filas = "";
            p.ofertas.forEach((o, i) => {
                const esMejor = i === 0;
                filas += `
                    <div class="item-row ${esMejor ? 'best' : ''}">
                        <div class="local-info">
                            <b>${o.local}</b>
                            <span>${esMejor ? 'OPCIÓN GANADORA' : 'Alternativa'}</span>
                        </div>
                        <div class="price-tag">
                            ${esMejor ? '<span class="win-label">EL MEJOR</span>' : ''}
                            <span class="amt" style="color:${esMejor ? 'var(--success)' : 'var(--text-dim)'}">$${o.precio.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            });

            contenedor.innerHTML += `
                <div class="product-card">
                    <div class="card-title"><span>📦 ${nombre}</span><span style="color:var(--primary)">Cant: ${p.ofertas[0].cant}</span></div>
                    ${filas}
                </div>`;
        }
        document.getElementById('total-prods').innerText = count;
        document.getElementById('total-savings').innerText = "$" + ahorroGlobal.toLocaleString();
    }
    window.onload = cargarDatos;
</script>
</body>
</html>
